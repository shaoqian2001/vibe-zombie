<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1a2a1a"/>
  <!-- City skyline silhouette -->
  <rect x="8"  y="75" width="16" height="45" fill="#2a3a2a"/>
  <rect x="28" y="55" width="20" height="65" fill="#2a3a2a"/>
  <rect x="52" y="65" width="24" height="55" fill="#2a3a2a"/>
  <rect x="80" y="50" width="18" height="70" fill="#2a3a2a"/>
  <rect x="102" y="70" width="18" height="50" fill="#2a3a2a"/>
  <!-- Zombie figure -->
  <circle cx="64" cy="36" r="14" fill="#5a8a4a"/>
  <!-- Zombie eyes (red) -->
  <circle cx="58" cy="34" r="3.5" fill="#dd2222"/>
  <circle cx="70" cy="34" r="3.5" fill="#dd2222"/>
  <!-- Zombie pupil dots -->
  <circle cx="59" cy="34" r="1.5" fill="#880000"/>
  <circle cx="71" cy="34" r="1.5" fill="#880000"/>
  <!-- Zombie mouth -->
  <path d="M58 44 Q64 49 70 44" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Zombie body -->
  <rect x="52" y="50" width="24" height="28" rx="4" fill="#4a7a3a"/>
  <!-- Zombie arms outstretched -->
  <rect x="20" y="52" width="34" height="9" rx="4.5" fill="#5a8a4a"/>
  <rect x="74" y="52" width="34" height="9" rx="4.5" fill="#5a8a4a"/>
  <!-- Zombie legs -->
  <rect x="52" y="78" width="10" height="20" rx="4" fill="#4a7a3a"/>
  <rect x="66" y="78" width="10" height="20" rx="4" fill="#4a7a3a"/>
  <!-- Red blood drips -->
  <circle cx="42" cy="56" r="3" fill="#cc1111"/>
  <circle cx="87" cy="56" r="3" fill="#cc1111"/>
</svg>
